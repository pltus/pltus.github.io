<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Pattern Display</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="color-page">
		<h1>Color Playground</h1>
		<p>Set RGB values and apply. Inputs are clamped to 0~255.</p>

		<div id="square" aria-label="Color sample" role="img"></div>

		<div class="controls" id="color-form">
			<label>R <input type="number" id="red" min="0" max="255" value="255" /></label>
			<label>G <input type="number" id="green" min="0" max="255" value="255" /></label>
			<label>B <input type="number" id="blue" min="0" max="255" value="255" /></label>
			<button id="applyColorBtn" type="button">Apply</button>
		</div>

		<p id="info" role="status" aria-live="polite">Ready.</p>
	</main>

	<script src="script.js" defer></script>
</body>
</html>
